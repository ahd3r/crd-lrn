version: "3.9"
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - ./www:/var/www/certbot
      - ./certbot:/etc/letsencrypt
  certbot:
    image: certbot/certbot
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        sleep 10d & wait $${!};
        certbot renew;
      done"
    volumes:
      - ./certbot:/etc/letsencrypt
      - ./www:/var/www/certbot
    depends_on:
      - nginx
